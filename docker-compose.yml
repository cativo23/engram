# Engram stack.
#   app — FastAPI + the static recall console (built from ./Dockerfile)
#   db  — Postgres 16 with pgvector, ready for P2 ingestion (the app does NOT
#         query it yet; search_code is still a stub). The DB is provisioned now
#         so `docker compose up` is the single entry point going forward.
#
# Usage:  cp .env.example .env  (fill OPENROUTER_API_KEY)  &&  docker compose up --build
#         then open http://127.0.0.1:8000/

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: engram
      POSTGRES_PASSWORD: engram
      POSTGRES_DB: engram
    # Host 5433 -> container 5432 (avoids clashing with a local Postgres on 5432).
    ports:
      - "5433:5432"
    volumes:
      - engram-pgdata:/var/lib/postgresql/data
      - ./docker/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engram -d engram"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    env_file: .env
    environment:
      # Consumed by lifespan (schema init) and search_code. Host `db` = the service name.
      DATABASE_URL: postgresql://engram:engram@db:5432/engram
      FASTEMBED_CACHE_PATH: /app/.fastembed_cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - engram-fastembed:/app/.fastembed_cache

volumes:
  engram-pgdata:
  engram-fastembed:
